esphome:
  name: immergas-tt-atom
  friendly_name: Immergas T-T+ Atom
  name_add_mac_suffix: false

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

logger:
  level: INFO

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Uses DHCP by default. Uncomment and adjust for a static IP:
  # manual_ip:
  #   static_ip: 192.168.1.50
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0

  ap:
    ssid: "Immergas T-T+ Atom Fallback"
    password: !secret fallback_ap_password

captive_portal:

# Atom Lite + MAX3485 / RS485 TTL 3.3 V
# Immergas T+ / T- -> RS485 module A/B
# If no response or CRC errors, swap T+ and T-.
uart:
  id: uart_immergas_tt
  tx_pin: GPIO26
  rx_pin: GPIO32
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 2   # 8N2 per Immergas manual (also reads fine on 8N1 receivers)

modbus:
  id: modbus_immergas_tt
  uart_id: uart_immergas_tt
  flow_control_pin: GPIO25
  send_wait_time: 150ms

modbus_controller:
  # Fast controller: control + key sensors (short queue = fast writes).
  - id: immergas_bms
    address: 11
    modbus_id: modbus_immergas_tt
    update_interval: 30s
    command_throttle: 80ms

  # Slow controller: unknown diagnostic registers (rarely change).
  - id: immergas_bms_diag
    address: 11
    modbus_id: modbus_immergas_tt
    update_interval: 300s
    command_throttle: 80ms

