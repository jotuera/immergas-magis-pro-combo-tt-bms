binary_sensor:
  - platform: template
    name: "Immergas - Fault active"
    id: immergas_error_active
    icon: mdi:alert
    device_class: problem
    lambda: |-
      if (isnan(id(immergas_pdu_2100).state)) return false;
      return (int) id(immergas_pdu_2100).state != 0;

  - platform: template
    name: "Immergas - Heating active"
    id: immergas_heating_active
    icon: mdi:radiator
    device_class: heat
    lambda: |-
      if (isnan(id(immergas_tryb_pracy_raw).state)) {
        return false;
      }
      return (int) id(immergas_tryb_pracy_raw).state == 3;

  - platform: template
    name: "Immergas - Cooling active"
    id: immergas_cooling_active
    icon: mdi:snowflake
    device_class: cold
    lambda: |-
      if (isnan(id(immergas_tryb_pracy_raw).state)) {
        return false;
      }
      return (int) id(immergas_tryb_pracy_raw).state == 2;

  - platform: template
    name: "Immergas - DHW active"
    id: immergas_dhw_active
    icon: mdi:water-boiler
    lambda: |-
      if (isnan(id(immergas_tryb_pracy_raw).state)) {
        return false;
