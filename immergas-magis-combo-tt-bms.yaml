button:
  - platform: restart
    name: "Restart Immergas T+T Atom"
    entity_category: config

water_heater:
  - platform: template
    name: "Immergas - DHW"
    id: immergas_cwu_water_heater
    icon: mdi:water-boiler

    current_temperature: !lambda |-
      return id(immergas_d03_dhw_temperatura_zasobnika).state;

    target_temperature: !lambda |-
      return id(immergas_zadana_temperatura_cwu).state;

    mode: !lambda |-
      return water_heater::WATER_HEATER_MODE_ECO;

    is_on: !lambda |-
      return true;

    supported_modes:
      - ECO

    visual:
      min_temperature: 10.0
      max_temperature: 55.0
      target_temperature_step: 1.0

    optimistic: true

    set_action:
      - lambda: |-
          float t = id(immergas_cwu_water_heater).get_target_temperature();
          ESP_LOGI("immergas_cwu", "Nowa zadana CWU z water_heater: %.1f C", t);

          auto call = id(immergas_zadana_temperatura_cwu).make_call();
          call.set_value(t);
          call.perform();
