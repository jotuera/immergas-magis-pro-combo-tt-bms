      return (int) id(immergas_tryb_pracy_raw).state == 1;

  - platform: status
    name: "Immergas - ESPHome status"
    entity_category: diagnostic

select:
  # Operating-mode control over the T-/T+ BMS.
  # Register 2000 reads stably. Write with caution - test individually.
  - platform: modbus_controller
    modbus_controller_id: immergas_bms
    name: "Immergas - System operating mode"
    id: immergas_operation_mode_select
    address: 2000
    value_type: U_WORD
    optionsmap:
      "Standby": 0
      "Summer (DHW)": 1
      "Cooling": 2
      "Winter (heating + DHW)": 3

number:
  # =========================================================
  # CONTROL — SETPOINTS / SLIDERS
  # =========================================================

  # DHW: set °C in HA; register 2095 receives x10 (e.g. 43°C -> 430).
  # 43°C -> 430, 50°C -> 500.
  - platform: modbus_controller
    modbus_controller_id: immergas_bms
    name: "Immergas - DHW setpoint"
    id: immergas_zadana_temperatura_cwu
    internal: true
    register_type: holding
    address: 2095
    value_type: S_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    min_value: 10
    max_value: 55
    step: 1
    multiply: 10
    mode: slider

  # R05 — Zone 1 min CH temperature. Register reads stably.
  - platform: modbus_controller
    modbus_controller_id: immergas_bms
    name: "Immergas - R05 Zone 1 minimum central heating"
    id: immergas_zone1_min_ch_set
    register_type: holding
    address: 4350
    value_type: U_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    min_value: 20
    max_value: 45
    step: 1
    mode: slider

  # R04 — Zone 1 max CH temperature. Register reads stably.
  - platform: modbus_controller
    modbus_controller_id: immergas_bms
    name: "Immergas - R04 Zone 1 maximum central heating"
    id: immergas_zone1_max_ch_set
    register_type: holding
    address: 4351
    value_type: U_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    min_value: 25
    max_value: 60
    step: 1
    mode: slider

  # R13 — Zone 1 max cooling temperature. Register reads stably.
  - platform: modbus_controller
    modbus_controller_id: immergas_bms
    name: "Immergas - R13 Zone 1 maximum cooling"
    id: immergas_zone1_max_cool_set
    register_type: holding
    address: 4356
    value_type: U_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    min_value: 7
    max_value: 25
    step: 1
    mode: slider

  # R12 — Zone 1 min cooling temperature. Register reads stably.
  - platform: modbus_controller
    modbus_controller_id: immergas_bms
    name: "Immergas - R12 Zone 1 minimum cooling"
    id: immergas_zone1_min_cool_set
    register_type: holding
    address: 4357
    value_type: U_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    min_value: 5
    max_value: 20
    step: 1
    mode: slider

  # A03 — circulation pump minimum speed. Configuration parameter.
  - platform: modbus_controller
    modbus_controller_id: immergas_bms
    name: "Immergas - A03 Minimum speed"
